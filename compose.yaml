services:
  postgres:
    image: postgres:17
    container_name: sso-postgres
    environment:
      POSTGRES_DB: ${SSO_POSTGRES_DB}
      POSTGRES_USER: ${SSO_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SSO_POSTGRES_PASSWORD}
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SSO_POSTGRES_USER} -d ${SSO_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    container_name: sso
    environment:
      CONFIG_PATH: ${CONFIG_PATH}
      SSO_POSTGRES_USER: ${SSO_POSTGRES_USER}
      SSO_POSTGRES_PASSWORD: ${SSO_POSTGRES_PASSWORD}
      SSO_POSTGRES_DB: ${SSO_POSTGRES_DB}
    ports:
      - "44044:44044"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: